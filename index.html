<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Donut SMP - Builder Service</title>
    <!-- YOUR ORIGINAL CSS GOES HERE -->
    <style>
        /* [Insert all your previous CSS here] */
        .view-panel { display: none; }
        .view-panel.active-view { display: block; }
        .admin-only { display: none; }
    </style>
</head>
<body>

    <!-- MODAL -->
    <div class="modal-overlay" id="how-it-works-modal" style="display:none;">
        <div class="modal-card">
            <button class="modal-close-x" onclick="closeModal()">✕</button>
            <h2 class="modal-title">HOW IT WORKS</h2>
            <button class="btn-modal-action" onclick="closeModal()">GOT IT</button>
        </div>
    </div>

    <!-- NAVIGATION -->
    <nav class="nav-grid">
        <button class="nav-btn" onclick="switchView('showcase')">Showcase</button>
        <button class="nav-btn" id="nav-auth-btn" onclick="handleAuthNavClick()">Login</button>
        <button class="nav-btn admin-only" id="nav-admin-btn" onclick="switchView('admin')">Admin UI</button>
        <button class="nav-btn" onclick="openModal()">Guide</button>
    </nav>

    <!-- VIEW: SHOWCASE -->
    <div id="view-showcase" class="view-panel active-view">
        <div id="catalog-grid"></div>
        <!-- Order Form and Community Links -->
        <div id="order-form-container">
            <!-- Your form code here -->
        </div>
        <div id="community-links">
            <!-- Your social links here -->
        </div>
    </div>

    <!-- VIEW: AUTH -->
    <div id="view-auth" class="view-panel">
        <form id="auth-form" onsubmit="executeAuthAction(event)">
            <input type="email" id="auth-email" placeholder="Email" required>
            <input type="password" id="auth-pass" placeholder="Password" required>
            <button type="submit">SIGN IN</button>
        </form>
    </div>

    <!-- VIEW: ADMIN -->
    <div id="view-admin" class="view-panel admin-only">
        <h1>Admin Control Panel</h1>
        <div id="admin-orders-list"></div>
    </div>

    <!-- CONSOLIDATED SCRIPT -->
    <script>
        // 1. Data
        const catalog = [
            { title: "Stash Vault", cat: "STASH", desc: "Secure 10x10 underground storage." },
            { title: "Automatic Wheat Farm", cat: "FARM", desc: "High-yield farm." },
            { title: "Full Regear Kit", cat: "REGEAR", desc: "Complete diamond gear set." },
            { title: "Perimeter Dig", cat: "DIGGING", desc: "100x100 chunk clearing." }
        ];

        // 2. Logic: Render
        function renderCatalog(filter = "ALL") {
            const grid = document.getElementById('catalog-grid');
            if(!grid) return;
            grid.innerHTML = "";
            const filtered = filter === "ALL" ? catalog : catalog.filter(i => i.cat === filter);
            filtered.forEach(item => {
                grid.innerHTML += `<div class="build-card"><h3>${item.title}</h3><p>${item.desc}</p></div>`;
            });
        }

        // 3. Logic: Navigation & Auth
        function switchView(viewId) {
            document.querySelectorAll('.view-panel').forEach(p => p.classList.remove('active-view'));
            document.getElementById('view-' + viewId).classList.add('active-view');
        }

        function handleAuthNavClick() {
            if (document.getElementById('nav-auth-btn').innerText === "Logout") {
                document.querySelectorAll('.admin-only').forEach(e => e.style.display = 'none');
                document.getElementById('nav-auth-btn').innerText = "Login";
            } else {
                switchView('auth');
            }
        }

        function executeAuthAction(e) {
            e.preventDefault();
            const email = document.getElementById('auth-email').value;
            if (email === "admin@donut.smp") {
                document.querySelectorAll('.admin-only').forEach(e => e.style.display = 'block');
                document.getElementById('nav-auth-btn').innerText = "Logout";
                switchView('showcase');
            } else {
                switchView('showcase');
            }
        }

        function openModal() { document.getElementById('how-it-works-modal').style.display = 'flex'; }
        function closeModal() { document.getElementById('how-it-works-modal').style.display = 'none'; }

        // 4. Init
        window.onload = () => {
            renderCatalog();
        };
    </script>
</body>
</html>
