<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Donut SMP - Builder Service</title>
    <!-- RESTORED ORIGINAL CSS -->
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@600;800&family=Inter:wght@400;500;600&display=swap');
        :root {
            --bg-dark: #0d0e11; --card-dark: #1a171e; --text-main: #b0b5c1;
            --accent-ember: #b84e36; --accent-gold: #d1a751; --accent-blue: #4b6b7c;
        }
        body { background-color: var(--bg-dark); color: var(--text-main); font-family: 'Inter', sans-serif; padding: 20px; }
        .view-panel { display: none; }
        .active-view { display: block; }
        .nav-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin-bottom: 20px; }
        .nav-btn { background: transparent; border: 1px solid var(--accent-blue); color: var(--text-main); padding: 10px; border-radius: 25px; cursor: pointer; }
        .build-card { background: var(--card-dark); border: 1px solid #26232b; padding: 20px; margin-bottom: 15px; border-radius: 8px; }
        h1, .card-title { color: var(--accent-gold); font-family: 'Cinzel', serif; }
        .admin-only { display: none; }
    </style>
</head>
<body>

    <!-- NAVIGATION -->
    <nav class="nav-grid">
        <button class="nav-btn" onclick="switchView('showcase')">Showcase</button>
        <button class="nav-btn" id="nav-auth-btn" onclick="handleAuth()">Login</button>
        <button class="nav-btn admin-only" id="nav-admin-btn" onclick="switchView('admin')">Admin UI</button>
        <button class="nav-btn" onclick="document.getElementById('modal').style.display='flex'">Guide</button>
    </nav>

    <!-- CONTENT -->
    <div id="view-showcase" class="view-panel active-view">
        <h1>SHOWCASE</h1>
        <div id="catalog-grid"></div>
    </div>

    <div id="view-admin" class="view-panel admin-only">
        <h1>ADMIN CONTROL</h1>
    </div>

    <!-- MODAL -->
    <div id="modal" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.8); justify-content:center; align-items:center;">
        <div style="background:#1a171e; padding:30px; border:1px solid #d1a751; color:#fff;">
            <h2>HOW IT WORKS</h2>
            <button onclick="document.getElementById('modal').style.display='none'">CLOSE</button>
        </div>
    </div>

    <!-- FULL FUNCTIONAL SCRIPT -->
    <script>
        const catalog = [
            { title: "Stash Vault", cat: "STASH", desc: "Secure underground storage." },
            { title: "Automatic Wheat Farm", cat: "FARM", desc: "High-yield farm." },
            { title: "Full Regear Kit", cat: "REGEAR", desc: "Complete diamond gear." },
            { title: "Perimeter Dig", cat: "DIGGING", desc: "Chunk clearing." }
        ];

        function renderCatalog() {
            const grid = document.getElementById('catalog-grid');
            grid.innerHTML = "";
            catalog.forEach(item => {
                grid.innerHTML += `<div class="build-card"><h3 class="card-title">${item.title}</h3><p>${item.desc}</p></div>`;
            });
        }

        function switchView(viewId) {
            document.querySelectorAll('.view-panel').forEach(p => p.classList.remove('active-view'));
            document.getElementById('view-' + viewId).classList.add('active-view');
        }

        function handleAuth() {
            const btn = document.getElementById('nav-auth-btn');
            if(btn.innerText === "Login") {
                const pass = prompt("Enter password (admin to test):");
                if(pass === "admin") {
                    document.querySelectorAll('.admin-only').forEach(e => e.style.display = 'block');
                    btn.innerText = "Logout";
                }
            } else {
                document.querySelectorAll('.admin-only').forEach(e => e.style.display = 'none');
                btn.innerText = "Login";
            }
        }

        window.onload = renderCatalog;
    </script>
</body>
</html>
