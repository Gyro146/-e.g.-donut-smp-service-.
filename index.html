<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Donut SMP - Builder Service</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@600;800&family=Inter:wght@400;500;600&display=swap');

        :root {
            --bg-dark: #0d0e11;       
            --card-dark: #1a171e;     
            --input-bg: #121014;      
            --text-main: #b0b5c1;     
            --text-light: #e2e8f0;    
            --accent-ember: #b84e36;  
            --accent-gold: #d1a751;   
            --accent-blue: #4b6b7c;   
            --border-color: #26232b;  
            --status-pending: #d1a751;
            --status-completed: #72b043;
            --yt-red: #ff0000;
            --discord-blurple: #5865f2;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background-color: var(--bg-dark); color: var(--text-main); font-family: 'Inter', sans-serif; padding: 20px; display: flex; flex-direction: column; align-items: center; min-height: 100vh; }
        .wrapper { width: 100%; max-width: 600px; }
        header { text-align: center; margin-top: 20px; margin-bottom: 40px; }
        .brand-sub { color: var(--accent-ember); font-family: 'Cinzel', serif; font-size: 0.8rem; letter-spacing: 3px; margin-bottom: 10px; }
        .status-badge { display: inline-flex; align-items: center; gap: 8px; background: rgba(75, 107, 124, 0.1); border: 1px solid var(--accent-blue); padding: 6px 16px; border-radius: 20px; font-size: 0.85rem; color: var(--text-light); margin-bottom: 20px; }
        .status-dot { width: 8px; height: 8px; background-color: #72b043; border-radius: 50%; }
        h1 { color: var(--accent-gold); font-family: 'Cinzel', serif; font-size: 2.2rem; font-weight: 800; margin-bottom: 8px; letter-spacing: 1px; }
        .tagline { font-style: italic; color: #718096; font-size: 0.95rem; }
        .nav-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin-bottom: 40px; }
        .nav-btn { background: transparent; border: 1px solid var(--accent-blue); color: var(--text-light); padding: 10px 4px; border-radius: 25px; text-align: center; text-decoration: none; font-size: 0.8rem; font-weight: 500; cursor: pointer; display: flex; align-items: center; justify-content: center; }
        .nav-btn.admin-only { border-color: var(--accent-gold); color: var(--accent-gold); display: none; }
        .view-panel { display: none; }
        .view-panel.active-view { display: block; }
        .section-title { color: var(--text-light); font-family: 'Cinzel', serif; font-size: 1.2rem; letter-spacing: 2px; margin-bottom: 15px; display: flex; align-items: center; gap: 8px; }
        .section-title::before { content: "◆"; color: var(--accent-ember); font-size: 0.9rem; }
        .section-desc { font-size: 0.9rem; color: #718096; margin-bottom: 20px; line-height: 1.5; }
        .search-container { display: flex; gap: 10px; margin-bottom: 25px; }
        .search-bar { flex: 1; background: var(--input-bg); border: 1px solid var(--border-color); padding: 12px; border-radius: 6px; color: var(--text-light); }
        .btn-search { background: var(--accent-ember); color: var(--text-light); border: none; padding: 12px 24px; border-radius: 6px; font-weight: bold; cursor: pointer; }
        .categories-container { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 30px; }
        .cat-chip { background: rgba(26, 23, 30, 0.6); border: 1px solid var(--border-color); color: #718096; padding: 8px 16px; border-radius: 20px; font-size: 0.8rem; cursor: pointer; }
        .cat-chip.active { background: var(--accent-ember); color: var(--text-light); border-color: var(--accent-ember); }
        .build-card { background: var(--card-dark); border: 1px solid var(--border-color); border-radius: 8px; overflow: hidden; margin-bottom: 20px; padding: 20px; }
        .card-tag { color: var(--accent-ember); font-size: 0.75rem; letter-spacing: 1px; display: block; margin-bottom: 5px; font-weight: 600; }
        .card-title { color: var(--text-light); font-family: 'Cinzel', serif; margin-bottom: 10px; }
        .btn-card-order { width: 100%; background: var(--accent-ember); color: var(--text-light); border: none; padding: 10px; border-radius: 4px; font-weight: bold; cursor: pointer; margin-top: 10px; }
        .form-panel { background: var(--card-dark); border: 1px solid var(--border-color); border-radius: 8px; padding: 25px; margin-bottom: 40px; }
        .form-group { margin-bottom: 20px; display: flex; flex-direction: column; }
        label { font-size: 0.75rem; color: #718096; margin-bottom: 8px; font-weight: 600; }
        input, textarea, select { background: var(--input-bg); border: 1px solid var(--border-color); padding: 12px; border-radius: 6px; color: var(--text-light); }
        .btn-submit { width: 100%; background: var(--accent-ember); color: var(--text-light); border: none; padding: 14px; font-weight: bold; border-radius: 6px; cursor: pointer; }
        .admin-order-card { background: var(--input-bg); border: 1px solid var(--border-color); border-radius: 6px; padding: 15px; margin-bottom: 15px; }
        .status-p { color: var(--accent-gold); }
        .status-c { color: var(--status-completed); }
        .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 0, 0, 0.7); z-index: 1000; display: none; align-items: center; justify-content: center; }
        .modal-card { background: var(--card-dark); border: 1px solid var(--border-color); border-radius: 12px; width: 90%; max-width: 400px; padding: 30px; text-align: center; }
    </style>
</head>
<body>

    <!-- MODAL -->
    <div class="modal-overlay" id="how-it-works-modal">
        <div class="modal-card">
            <h2 style="color:var(--accent-gold); margin-bottom:20px;">HOW IT WORKS</h2>
            <p style="margin-bottom:20px; font-size:0.9rem;">1. Browse builds <br> 2. Submit form <br> 3. Get Discord update</p>
            <button class="btn-submit" onclick="closeModal()">GOT IT</button>
        </div>
    </div>

    <div class="wrapper">
        <header>
            <div class="brand-sub">DONUT SMP • BUILDER SERVICE</div>
            <h1>OUR WORK & SERVICE</h1>
        </header>

        <nav class="nav-grid">
            <button class="nav-btn" onclick="switchView('showcase')">Showcase</button>
            <button class="nav-btn" id="nav-auth-btn" onclick="handleAuthNavClick()">Login</button>
            <button class="nav-btn admin-only" id="nav-admin-btn" onclick="switchView('admin')">Admin UI</button>
            <button class="nav-btn" onclick="openModal()">Guide</button>
        </nav>

        <!-- VIEW: SHOWCASE -->
        <div id="view-showcase" class="view-panel active-view">
            <div id="catalog-grid"></div>
            <div class="form-panel">
                <h2 class="section-title">ORDER FORM</h2>
                <form id="order-form">
                    <div class="form-group"><label>DISCORD</label><input type="text" id="discord-user" required></div>
                    <div class="form-group"><label>SERVICE</label><select id="service-type"><option>Stash Build</option><option>Digging Service</option></select></div>
                    <div class="form-group"><label>DETAILS</label><textarea id="order-details" rows="3"></textarea></div>
                    <button type="submit" class="btn-submit">SUBMIT ORDER</button>
                </form>
            </div>
        </div>

        <!-- VIEW: AUTH -->
        <div id="view-auth" class="view-panel">
            <h2 class="section-title">LOGIN</h2>
            <div class="form-panel">
                <form id="auth-form" onsubmit="executeAuthAction(event)">
                    <div class="form-group"><label>EMAIL</label><input type="email" id="auth-email" required></div>
                    <div class="form-group"><label>PASS</label><input type="password" id="auth-pass" required></div>
                    <button type="submit" class="btn-submit">SIGN IN</button>
                </form>
            </div>
        </div>

        <!-- VIEW: ADMIN -->
        <div id="view-admin" class="view-panel">
            <h2 class="section-title">ADMIN PANEL</h2>
            <div id="admin-orders-list"></div>
        </div>
    </div>

    <script>
        let buildCatalog = [{name: "Mega Gold Farm", category: "FARM", description: "High efficiency."}, {name: "Vault", category: "STASH", description: "Obsidian room."}];
        let databaseOrders = [{id: 1, user: "Player1", type: "Vault", status: "Pending"}];
        let loggedInUser = null;

        function switchView(view) {
            document.querySelectorAll('.view-panel').forEach(p => p.classList.remove('active-view'));
            document.getElementById(`view-${view}`).classList.add('active-view');
        }

        function renderCatalog() {
            const grid = document.getElementById('catalog-grid');
            grid.innerHTML = buildCatalog.map(item => `
                <div class="build-card">
                    <span class="card-tag">${item.category}</span>
                    <h3 class="card-title">${item.name}</h3>
                    <p>${item.description}</p>
                    <button class="btn-card-order" onclick="switchView('showcase')">ORDER</button>
                </div>
            `).join('');
        }

        function renderAdminDashboard() {
            const container = document.getElementById('admin-orders-list');
            container.innerHTML = databaseOrders.map(order => `
                <div class="admin-order-card">
                    <div><strong>${order.user}</strong> - ${order.status}</div>
                    <button onclick="completeOrder(${order.id})">Mark Complete</button>
                </div>
            `).join('');
        }

        window.completeOrder = (id) => {
            databaseOrders = databaseOrders.map(o => o.id === id ? {...o, status: 'Completed'} : o);
            renderAdminDashboard();
        };

        window.executeAuthAction = (e) => {
            e.preventDefault();
            const email = document.getElementById('auth-email').value;
            loggedInUser = { role: email === 'admin@donut.smp' ? 'admin' : 'player' };
            if(loggedInUser.role === 'admin') document.getElementById('nav-admin-btn').style.display = "flex";
            alert("Logged in!");
            switchView('showcase');
        };

        window.handleAuthNavClick = () => {
            if(loggedInUser) { loggedInUser = null; alert("Logged out."); location.reload(); }
            else switchView('auth');
        };

        window.openModal = () => document.getElementById('how-it-works-modal').style.display = "flex";
        window.closeModal = () => document.getElementById('how-it-works-modal').style.display = "none";

        document.getElementById('order-form').addEventListener('submit', (e) => {
            e.preventDefault();
            alert("Order Submitted!");
            databaseOrders.push({id: Date.now(), user: document.getElementById('discord-user').value, status: 'Pending'});
            renderAdminDashboard();
        });

        renderCatalog();
        renderAdminDashboard();
    </script>
</body>
</html>
